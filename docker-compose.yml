version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: face-ai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-face_ai_dev_password}
      MYSQL_DATABASE: face_ai_interview
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis/redis-stack:latest
    container_name: face-ai-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: face-ai-backend
    ports:
      - "8002:8002"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/face_ai_interview?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-face_ai_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_API_KEY: ${AI_API_KEY:-sk-placeholder}
      JWT_SECRET: ${JWT_SECRET:-face-ai-docker-secret-change-me-2026}
      OCR_DATA_PATH: /app/tessdata
    volumes:
      - backend_data:/app/data
      - ./backend/tessdata:/app/tessdata:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: face-ai-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  backend_data:
